<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Radii & Shadow</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  body { width: 700px; height: 220px; padding: 28px; box-sizing: border-box; font-family: var(--font-ui); display: flex; align-items: center; gap: 24px; justify-content: center; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 80px; height: 80px; background: #fff; border: 1px solid #eee; }
  .label { font-size: 10px; color: #6b6b6b; text-transform: uppercase; letter-spacing: 0.1em; }
  .px { font-family: ui-monospace, monospace; font-size: 11px; color: #000; }
  .s1 { box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
  .s2 { box-shadow: 0 4px 14px rgba(0,0,0,0.08); }
  .s3 { box-shadow: 0 12px 40px rgba(0,0,0,0.12); }
</style>
</head>
<body>
  <div class="col"><div class="box" style="border-radius:0"></div><div class="label">Square</div><div class="px">0</div></div>
  <div class="col"><div class="box" style="border-radius:4px"></div><div class="label">md</div><div class="px">4</div></div>
  <div class="col"><div class="box" style="border-radius:8px"></div><div class="label">lg</div><div class="px">8</div></div>
  <div class="col"><div class="box" style="border-radius:999px"></div><div class="label">pill</div><div class="px">∞</div></div>
  <div class="col"><div class="box s1"></div><div class="label">shadow-1</div><div class="px">hairline</div></div>
  <div class="col"><div class="box s2"></div><div class="label">shadow-2</div><div class="px">ambient</div></div>
  <div class="col"><div class="box s3"></div><div class="label">shadow-3</div><div class="px">modal</div></div>
</body>
</html>
