<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Section Divider</title>
<style>
  @font-face { font-family: "Bahnschrift"; src: url("../fonts/Bahnschrift.ttf") format("truetype"); font-display: block; }
  @font-face { font-family: "P22 Allyson Pro"; src: url("../fonts/Bogota-3651.otf") format("opentype"); font-style: italic; font-display: block; }
  @import url("https://fonts.googleapis.com/css2?family=Montserrat:wght@400&display=swap");
  html, body { margin: 0; padding: 0; background: #10100f; color: #fff; }
  body { width: 700px; height: 240px; padding: 32px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
  .eyebrow { font-family: 'P22 Allyson Pro', cursive; font-style: italic; font-size: 34px; color: #faab64; line-height: 1; }
  .heading { font-family: 'Bahnschrift', sans-serif; font-weight: 600; font-size: 56px; line-height: 1; color: #ff5c00; margin-top: 4px; letter-spacing: 0.04em; text-transform: uppercase; }
  .rule { width: 48px; height: 1px; background: #ff5c00; margin: 14px 0 10px; opacity: 0.7; }
  .caps { font-family: 'Bahnschrift', sans-serif; font-weight: 500; font-size: 11px; letter-spacing: 0.36em; text-transform: uppercase; color: rgba(255,255,255,0.7); margin-bottom: 4px; }
  .body { font-family: 'Montserrat', sans-serif; font-weight: 400; font-size: 14px; color: rgba(255,255,255,0.78); max-width: 460px; text-align: center; line-height: 1.6; }
</style>
</head>
<body>
  <div class="eyebrow">Нашата</div>
  <div class="heading">КУХНЯ</div>
  <div class="rule"></div>
  <div class="caps">Bulgarian Kitchen</div>
  <div class="body">Класически български вкусове, поднесени с уважение към сезона и продукта.</div>
</body>
</html>
