<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Type Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  body { width: 700px; height: 280px; padding: 28px 32px; box-sizing: border-box; font-family: var(--font-ui); }
  table { width: 100%; border-collapse: collapse; }
  td { padding: 6px 0; vertical-align: baseline; border-bottom: 1px solid #eee; }
  .token { font-size: 11px; color: #6b6b6b; text-transform: uppercase; letter-spacing: 0.1em; width: 60px; }
  .px { font-family: ui-monospace, monospace; font-size: 11px; color: #6b6b6b; width: 50px; }
  .specimen { font-family: var(--font-display); text-transform: uppercase; line-height: 1; }
</style>
</head>
<body>
<table>
  <tr><td class="token">hero</td><td class="px">128</td><td class="specimen" style="font-size:64px">Аа Бб</td></tr>
  <tr><td class="token">4xl</td><td class="px">80</td><td class="specimen" style="font-size:48px">Аа Бб</td></tr>
  <tr><td class="token">3xl</td><td class="px">56</td><td class="specimen" style="font-size:36px">Аа Бб</td></tr>
  <tr><td class="token">2xl</td><td class="px">40</td><td class="specimen" style="font-size:28px">Аа Бб</td></tr>
  <tr><td class="token">xl</td><td class="px">28</td><td class="specimen" style="font-size:22px">Аа Бб</td></tr>
  <tr><td class="token">lg</td><td class="px">22</td><td class="specimen" style="font-size:18px">Аа Бб</td></tr>
  <tr style="border:0"><td class="token">md</td><td class="px">18</td><td class="specimen" style="font-size:16px">Аа Бб</td></tr>
</table>
</body>
</html>
