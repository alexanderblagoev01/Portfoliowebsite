<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Menu Item</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #f5f1ea; }
  body { width: 700px; height: 280px; padding: 32px 40px; box-sizing: border-box; font-family: var(--font-body); }
  .item { display: grid; grid-template-columns: 1fr auto; gap: 4px 16px; padding: 16px 0; border-bottom: 1px solid #b1b1b1; }
  .name { font-family: var(--font-display); font-weight: 500; font-size: 18px; text-transform: uppercase; letter-spacing: 0.05em; color: #000; }
  .price { font-family: var(--font-display); font-weight: 500; font-size: 18px; color: #000; letter-spacing: 0.04em; }
  .desc { font-family: var(--font-body); font-style: italic; font-size: 15px; color: #282828; grid-column: 1 / -1; line-height: 1.4; max-width: 480px; }
  .hover { background: rgba(255,92,0,0.04); border-left: 2px solid #ff5c00; padding-left: 14px; margin-left: -16px; }
</style>
</head>
<body>
  <div class="item">
    <div class="name">Телешки бузи</div>
    <div class="price">32 лв.</div>
    <div class="desc">Бавно готвени с червено вино, корени и мащерка.</div>
  </div>
  <div class="item hover">
    <div class="name">Печена пъстърва</div>
    <div class="price">28 лв.</div>
    <div class="desc">С хрупкави билкови картофи и лимонов жълтък. <em style="color:#6b6b6b">— hover state</em></div>
  </div>
  <div class="item" style="border-bottom:0">
    <div class="name">Шопска салата</div>
    <div class="price">12 лв.</div>
    <div class="desc">Класиката — домати, краставица, чушки, лук, сирене.</div>
  </div>
</body>
</html>
