<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Footer</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #282828; }
  body { width: 1280px; height: 240px; padding: 48px 64px; box-sizing: border-box; font-family: var(--font-body); color: #f5f1ea; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 40px; }
  @font-face { font-family: "Bahnschrift"; src: url("../fonts/Bahnschrift.ttf") format("truetype"); font-display: block; }
  @font-face { font-family: "P22 Allyson Pro"; src: url("../fonts/Bogota-3651.otf") format("opentype"); font-style: italic; font-display: block; }
  .name { font-family: 'Bahnschrift', sans-serif; font-weight: 600; font-size: 32px; text-transform: uppercase; letter-spacing: 0.05em; }
  .script { font-family: 'P22 Allyson Pro', 'Allura', cursive; color: #faab64; font-size: 22px; font-style: italic; display: block; line-height: 1; margin-bottom: 4px; }
  .tag { font-family: 'Montserrat', sans-serif; font-size: 13px; color: #d4cfc6; margin-top: 12px; max-width: 260px; line-height: 1.6; }
  .h { font-family: 'Bahnschrift', sans-serif; font-weight: 500; text-transform: uppercase; font-size: 11px; letter-spacing: 0.18em; color: #faab64; margin-bottom: 14px; }
  .col p { font-size: 14px; line-height: 1.6; margin: 0 0 4px; color: #f5f1ea; }
  a { color: inherit; text-decoration: none; }
</style>
</head>
<body>
  <div>
    <span class="script">Ресторант</span>
    <div class="name">Богота</div>
    <div class="tag">Кухня от сърцето на София. Класика, поднесена с уважение към продукта.</div>
  </div>
  <div class="col"><div class="h">Адрес</div><p>ул. Примерна 12</p><p>София 1000</p></div>
  <div class="col"><div class="h">Контакти</div><p>+359 2 123 4567</p><p>info@bogota.bg</p></div>
  <div class="col"><div class="h">Часове</div><p>Пон–Пет · 12:00–23:00</p><p>Съб–Нед · 11:00–24:00</p></div>
</body>
</html>
