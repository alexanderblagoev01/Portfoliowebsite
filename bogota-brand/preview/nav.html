<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nav Header</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  body { width: 1280px; height: 96px; font-family: var(--font-ui); }
  .nav { height: 72px; padding: 0 48px; display: flex; align-items: center; gap: 48px; border-bottom: 1px solid #eee; box-shadow: 0 1px 2px rgba(0,0,0,0.04); background: #fff; margin-top: 12px; }
  .logo { display: flex; align-items: center; gap: 0; }
  @font-face { font-family: "Bahnschrift"; src: url("../fonts/Bahnschrift.ttf") format("truetype"); font-display: block; }
  @font-face { font-family: "P22 Allyson Pro"; src: url("../fonts/Bogota-3651.otf") format("opentype"); font-style: italic; font-display: block; }
  .logo .script { font-family: 'P22 Allyson Pro', 'Allura', cursive; font-style: italic; color: #faab64; font-size: 22px; line-height: 1; margin-right: 8px; }
  .logo .name { font-family: 'Bahnschrift', sans-serif; font-weight: 600; font-size: 28px; letter-spacing: 0.05em; color: #000; text-transform: uppercase; }
  .links { display: flex; gap: 36px; }
  .links a { color: #000; text-decoration: none; font-size: 13px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.16em; }
  .links a.active { color: #ff5c00; }
  .cta { margin-left: auto; background: #ff5c00; color: #fff; border: 0; padding: 12px 24px; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.14em; font-size: 12px; font-weight: 500; cursor: pointer; }
</style>
</head>
<body>
  <div class="nav">
    <div class="logo"><span class="script">Ресторант</span><span class="name">БОГОТА</span></div>
    <div class="links">
      <a href="#" class="active">Начало</a>
      <a href="#">Меню</a>
      <a href="#">Кухнята ни</a>
      <a href="#">Контакти</a>
    </div>
    <button class="cta">Запазете маса</button>
  </div>
</body>
</html>
