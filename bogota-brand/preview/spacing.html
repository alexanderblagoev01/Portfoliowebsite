<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  body { width: 700px; height: 200px; padding: 28px; box-sizing: border-box; font-family: var(--font-ui); display: flex; align-items: center; gap: 18px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { background: #ff5c00; }
  .label { font-size: 10px; color: #6b6b6b; text-transform: uppercase; letter-spacing: 0.1em; }
  .px { font-family: ui-monospace, monospace; font-size: 11px; color: #000; }
</style>
</head>
<body>
  <div class="col"><div class="box" style="width:4px;height:4px"></div><div class="label">1</div><div class="px">4</div></div>
  <div class="col"><div class="box" style="width:8px;height:8px"></div><div class="label">2</div><div class="px">8</div></div>
  <div class="col"><div class="box" style="width:12px;height:12px"></div><div class="label">3</div><div class="px">12</div></div>
  <div class="col"><div class="box" style="width:16px;height:16px"></div><div class="label">4</div><div class="px">16</div></div>
  <div class="col"><div class="box" style="width:24px;height:24px"></div><div class="label">5</div><div class="px">24</div></div>
  <div class="col"><div class="box" style="width:32px;height:32px"></div><div class="label">6</div><div class="px">32</div></div>
  <div class="col"><div class="box" style="width:48px;height:48px"></div><div class="label">7</div><div class="px">48</div></div>
  <div class="col"><div class="box" style="width:64px;height:64px"></div><div class="label">8</div><div class="px">64</div></div>
</body>
</html>
