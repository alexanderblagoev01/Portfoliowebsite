<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Body Type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  body { width: 700px; height: 280px; padding: 32px; box-sizing: border-box; color: #000; }
  .lead {
    font-family: 'Montserrat', system-ui, sans-serif;
    font-weight: 300;
    font-size: 22px;
    line-height: 1.45;
    color: #1a1a1a;
    max-width: 600px;
    letter-spacing: -0.005em;
  }
  .body {
    font-family: 'Montserrat', system-ui, sans-serif;
    font-weight: 400;
    font-size: 16px;
    line-height: 1.6;
    color: #282828;
    max-width: 600px;
    margin-top: 14px;
  }
  .meta {
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 10px;
    color: #6b6b6b;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    margin-bottom: 8px;
  }
</style>
</head>
<body>
  <div class="meta">Lead · 22px Montserrat Light</div>
  <p class="lead">Кухня от сърцето на София — класика, поднесена с уважение към продукта.</p>
  <div class="meta" style="margin-top: 18px;">Body · 16px Montserrat Regular</div>
  <p class="body">Ресторант Богота отваря врати всеки ден. Менюто се променя със сезона, а виното е подбрано лично от собственика. Заповядайте.</p>
</body>
</html>
